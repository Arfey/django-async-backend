shell: bash

init: |
  [ -e ".lets/init" ] && exit 0
  echo ✅ install pre-commit
  pip install pre-commit --break-system-packages
  echo ✅ init pre-commit
  pre-commit install
  echo ✅ setup .git-blame-ignore-revs
  git config blame.ignoreRevsFile .git-blame-ignore-revs
  echo ✅ Done!
  touch .lets/init

commands:
  test_app:
    description: Run test application
    cmd: cd test_example && PYTHONPATH=. DJANGO_SETTINGS_MODULE='test_example.settings' poetry run uvicorn test_example.asgi:application --reload --host 0.0.0.0 --port 8000

  test_generate:
    description: Generate ORM
    cmd: |
      git restore django_async_backend/db/models/query.py django_async_backend/db/models/sql/compiler.py django_async_backend/db/models/sql/query.py
      poetry run python -m codemon
      poetry run pre-commit run darker -v --all-files || true

  test:
    cmd: |
      if docker compose ps postgres | grep -q 'Up'; then
        echo "✅ postgres is already running"
      else
        echo "🚀 starting postgres"
        docker compose up postgres -d
      fi
      cd tests && poetry run python manage.py test
