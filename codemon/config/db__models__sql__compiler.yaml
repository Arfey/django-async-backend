pathname: db/models/sql/compiler.py

module:
  functions:
    cursor_iter:
      to_async: true
      calls:
        - func:
            attr: close
          to_await: true
        - name: iter
          replace_raw: fetchmany_iter()
      for_statements:
        - target: rows
          to_async: true
      add_raw_top:
        - |
            async def fetchmany_iter():
                while True:
                    rows = await cursor.fetchmany(itersize)
                    if rows == sentinel:
                        break
                    yield rows
  classes:
    SQLCompiler:
      methods:
        # as_sql() stays sync; read the autocommit attribute, falling back
        # to settings when not yet connected (what connect() would set).
        as_sql:
          calls:
            - func:
                attr: get_autocommit
              replace_raw: |
                (
                    self.connection.autocommit
                    if self.connection.connection is not None
                    else self.connection.settings_dict["AUTOCOMMIT"]
                )

        execute_sql:
          to_async: true
          return_blocks:
            - replace_raw: '[i async for i in result]'
              call:
                name: list

          calls:
            - func:
                attr: chunked_cursor
              to_await: true
            - func:
                attr: cursor
              to_await: true
            - func:
                attr: execute
              to_await: true
            - func:
                attr: fetchone
              to_await: true
            - func:
                value: cursor
                attr: close
              to_await: true
            - name: iter
              replace_raw: '[]'

        has_results:
          to_async: true
          calls:
            - func:
                attr: execute_sql
              to_await: true
        results_iter:
          to_async: true
          calls:
            - func:
                attr: execute_sql
              to_await: true
        explain_query:
          to_async: true
          calls:
            - func:
                attr: execute_sql
              to_await: true

    SQLUpdateCompiler:
      methods:
        execute_sql:
          to_async: true
          # pre_sql_setup() (called by as_sql()) is still sync. For a plain
          # single-table update it returns early without running SQL, so the
          # async path is safe. But when the query touches a parent model
          # (multi-table inheritance), pre_sql_setup() runs a pre-select to
          # collect ids -- and it does so through Django's *sync* connection
          # registry, outside async_connections and the async transaction.
          # Reject that case loudly instead of silently using the wrong
          # connection until pre_sql_setup() is made async.
          add_raw_top:
            - |
                if self.query.related_updates:
                    raise NotImplementedError(
                        "Async update does not yet support updating fields "
                        "inherited from a parent model (multi-table "
                        "inheritance)."
                    )
          calls:
            - func:
                attr: execute_sql
              to_await: true

        execute_returning_sql:
          to_async: true
          context_managers:
            - asname: cursor
              to_async: true
          calls:
            - func:
                attr: execute_sql
              to_await: true
            - func:
                attr: cursor
              to_await: true
            - func:
                value: cursor
                attr: execute
              to_await: true
            - func:
                attr: fetch_returned_rows
              replace_raw: await cursor.fetchall()

    SQLInsertCompiler:
      methods:
        execute_sql:
          to_async: True
          context_managers:
            - asname: cursor
              to_async: true
          calls:
            - func:
                attr: cursor
              to_await: true
            - func:
                value: cursor
                attr: execute
              to_await: true
            - func:
                attr: fetch_returned_rows
              replace_raw: await cursor.fetchall()
